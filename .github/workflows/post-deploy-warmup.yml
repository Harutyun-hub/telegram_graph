name: Post-Deploy Warmup

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  warmup:
    runs-on: ubuntu-latest
    env:
      PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
      ANALYTICS_API_KEY_FRONTEND: ${{ secrets.ANALYTICS_API_KEY_FRONTEND }}
    steps:
      - name: Skip when warmup secrets are not configured
        if: ${{ env.PRODUCTION_BASE_URL == '' || env.ANALYTICS_API_KEY_FRONTEND == '' }}
        run: echo "Skipping warmup because PRODUCTION_BASE_URL or ANALYTICS_API_KEY_FRONTEND is not configured."

      - name: Wait for service readiness
        if: ${{ env.PRODUCTION_BASE_URL != '' && env.ANALYTICS_API_KEY_FRONTEND != '' }}
        run: |
          python - <<'PY'
          import os
          import time
          import urllib.request

          base_url = os.environ["PRODUCTION_BASE_URL"].rstrip("/")
          ready_url = f"{base_url}/readyz"
          deadline = time.time() + 300

          while time.time() < deadline:
              try:
                  with urllib.request.urlopen(ready_url, timeout=15) as response:
                      if response.status == 200:
                          print("Service is ready.")
                          break
              except Exception as exc:
                  print(f"Still waiting for readiness: {exc}")
              time.sleep(10)
          else:
              raise SystemExit("Timed out waiting for /readyz")
          PY

      - name: Warm dashboard and topics caches
        if: ${{ env.PRODUCTION_BASE_URL != '' && env.ANALYTICS_API_KEY_FRONTEND != '' }}
        run: |
          base_url="${PRODUCTION_BASE_URL%/}"
          auth_header="Authorization: Bearer ${ANALYTICS_API_KEY_FRONTEND}"
          curl -fsS --retry 3 --retry-delay 5 -H "$auth_header" "$base_url/api/dashboard" > /dev/null
          curl -fsS --retry 3 --retry-delay 5 -H "$auth_header" "$base_url/api/topics?page=0&size=100" > /dev/null
