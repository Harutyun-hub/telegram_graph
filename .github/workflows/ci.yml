name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Check secret hygiene
        run: python scripts/check_secret_hygiene.py

      - name: Lint backend
        run: |
          ruff check --select F,E9 \
            config.py \
            api/server.py \
            api/runtime_coordinator.py \
            api/scraper_scheduler.py \
            api/worker.py \
            tests/test_runtime_hardening.py \
            tests/test_ai_helper.py \
            tests/test_analytics_auth.py \
            tests/test_operator_auth.py \
            tests/test_service_gap_detection.py \
            scripts/check_secret_hygiene.py \
            scripts/run_smoke_checks.py

      - name: Run backend tests with coverage
        run: |
          pytest \
            --cov=api \
            --cov=buffer \
            --cov=scraper \
            --cov=processor \
            --cov=ingester \
            --cov-report=term-missing \
            --cov-fail-under=25

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build

  quality-gate:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Confirm CI quality gate
        run: echo "Backend and frontend checks passed."
