name: CI

on:
  push:
    branches: ["main", "staging"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_API_ID: "1"
      TELEGRAM_API_HASH: "test-hash"
      SUPABASE_URL: "https://example.supabase.co"
      SUPABASE_SERVICE_ROLE_KEY: "test-service-role-key"
      NEO4J_URI: "bolt://localhost:7687"
      NEO4J_PASSWORD: "test-neo4j-password"
      OPENAI_API_KEY: "test-openai-key"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Compile backend modules
        run: python -m compileall api buffer scraper processor ingester scripts tests

      - name: Check secret hygiene
        run: python scripts/check_secret_hygiene.py

      - name: Lint backend
        run: |
          ruff check --select F,E9 \
            config.py \
            api/server.py \
            api/aggregator.py \
            api/topic_overviews.py \
            api/runtime_executors.py \
            api/queries/comparative.py \
            buffer/supabase_writer.py \
            tests/test_analytics_auth.py \
            tests/test_dashboard_persisted_cache.py \
            tests/test_dashboard_refresh_wait.py \
            tests/test_runtime_persistence.py \
            tests/test_runtime_stability.py \
            tests/test_server_runtime_roles.py \
            tests/test_topic_overviews.py \
            scripts/check_secret_hygiene.py \
            scripts/run_smoke_checks.py

      - name: Run backend tests with coverage
        run: |
          pytest \
            --cov=api \
            --cov=buffer \
            --cov=scraper \
            --cov=processor \
            --cov=ingester \
            --cov-report=term-missing \
            --cov-fail-under=20

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  quality-gate:
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - backend
      - frontend
    steps:
      - name: Confirm CI quality gate
        run: |
          test "${{ needs.backend.result }}" = "success"
          test "${{ needs.frontend.result }}" = "success"
