name: Deployment Smoke Checks

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment to use for smoke checks
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  smoke:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      DEPLOY_BASE_URL: ${{ secrets.DEPLOY_BASE_URL || secrets.PRODUCTION_BASE_URL }}
      ANALYTICS_API_KEY_FRONTEND: ${{ secrets.ANALYTICS_API_KEY_FRONTEND }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run deployment smoke checks
        run: |
          python scripts/run_smoke_checks.py \
            --label "${{ inputs.environment }}" \
            --wait-ready
